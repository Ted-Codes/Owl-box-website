<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Owl Box Dashboard</title>

    <!-- Styling -->
    <link rel="stylesheet" href="style.css">

    <!-- Chart.js for graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <header>
        <h1>🦉 Smart Owl Box</h1>
        <p>Live Wildlife Monitoring Dashboard</p>
    </header>


    <main>

        <!-- Live Stream -->
        <section class="card">
            <h2>🎥 Live Camera</h2>

            <div class="video-container">
                <iframe
                    src="https://www.youtube.com/embed/SuNY8WJ16ok"
                    title="Smart Owl Box Live Stream"
                    allowfullscreen>
                </iframe>
            </div>

        </section>


        <!-- Current Data -->
        <section class="dashboard-grid">

            <div class="card">
                <h2>🦉 Owl Count</h2>
                <p id="owl-count">Loading...</p>
            </div>


            <div class="card">
                <h2>🌡 Temperature</h2>
                <p id="temperature">Loading...</p>
            </div>


            <div class="card">
                <h2>☁ Weather</h2>
                <p id="weather">Loading...</p>
            </div>


            <div class="card">
                <h2>🕒 Last Updated</h2>
                <p id="updated">Loading...</p>
            </div>

        </section>


        <!-- Graphs -->
        <section class="card">
            <h2>📈 Owl Activity</h2>
            <canvas id="owlChart"></canvas>
        </section>


        <section class="card">
            <h2>🌡 Temperature History</h2>
            <canvas id="tempChart"></canvas>
        </section>


    </main>


    <footer>
        <p>Smart Owl Box Project | Wildlife Data Monitoring</p>
    </footer>


    <!-- Website Logic -->
    <script src="script.js"></script>

</body>
</html>
